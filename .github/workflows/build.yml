name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: تنزيل الكود
        uses: actions/checkout@v4
      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: تثبيت Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: توليد هيكل مشروع أندرويد (نسخة نظيفة دايمًا)
        run: |
          rm -rf android
          mkdir -p /tmp/scaffold
          flutter create --platforms=android --org com.sawaedarab --project-name sawaed_app /tmp/scaffold
          cp -r /tmp/scaffold/android .
      - name: تصحيح إصدارات Kotlin وAGP وcompileSdk
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle
          sed -i 's/id "com.android.application" version "[^"]*"/id "com.android.application" version "8.3.0"/' android/settings.gradle
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/' android/app/build.gradle
          sed -i '/compileSdk = 35/a\    ndkVersion = "25.1.8937393"' android/app/build.gradle
          sed -i 's#distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-8.6-all.zip#' android/gradle/wrapper/gradle-wrapper.properties
      - name: تغيير اسم التطبيق الظاهر تحت الأيقونة إلى SAC
        run: |
          sed -i 's/android:label="[^"]*"/android:label="SAC"/' android/app/src/main/AndroidManifest.xml
          echo "===== AndroidManifest.xml (سطر label) ====="
          grep "android:label" android/app/src/main/AndroidManifest.xml
      - name: إضافة رخصة الإنترنت والموقع (ضرورية لتحميل اللوجو والاتصال بالـAPI وتسجيل الحضور)
        run: |
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>' android/app/src/main/AndroidManifest.xml
          echo "===== AndroidManifest.xml (كامل) ====="
          cat android/app/src/main/AndroidManifest.xml
      - name: تثبيت الحزم
        run: flutter pub get
      - name: تصحيح ملف geolocator_android مباشرة (باج معروف مع flutter.compileSdkVersion)
        run: |
          GEO_GRADLE=$(find / -path "*/geolocator_android-*/android/build.gradle" 2>/dev/null | head -1)
          if [ -n "$GEO_GRADLE" ]; then
            echo "لقيت الملف في: $GEO_GRADLE"
            sed -i 's/flutter\.compileSdkVersion/35/g' "$GEO_GRADLE"
            sed -i 's/flutter\.ndkVersion/"25.1.8937393"/g' "$GEO_GRADLE"
            sed -i 's/flutter\.minSdkVersion/21/g' "$GEO_GRADLE"
            sed -i 's/flutter\.targetSdkVersion/35/g' "$GEO_GRADLE"
            echo "===== محتوى الملف بعد التصحيح ====="
            cat "$GEO_GRADLE"
          else
            echo "تحذير: لم يتم العثور على ملف geolocator_android build.gradle"
          fi
      - name: توليد أيقونة التطبيق من assets/icon/app_icon.png
        run: dart run flutter_launcher_icons
      - name: بناء APK
        run: flutter build apk --release
      - name: رفع الـ APK كملف جاهز للتنزيل
        uses: actions/upload-artifact@v4
        with:
          name: sawaed-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
