name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: تنزيل الكود
        uses: actions/checkout@v4
      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: تثبيت Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: توليد هيكل مشروع أندرويد (نسخة نظيفة دايمًا)
        run: |
          rm -rf android
          mkdir -p /tmp/scaffold
          flutter create --platforms=android --org com.sawaedarab --project-name sawaed_app /tmp/scaffold
          cp -r /tmp/scaffold/android .
      - name: تصحيح إصدارات Kotlin وAGP وcompileSdk
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle
          sed -i 's/id "com.android.application" version "[^"]*"/id "com.android.application" version "8.3.0"/' android/settings.gradle
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/' android/app/build.gradle
          sed -i '/compileSdk = 35/a\    ndkVersion = "25.1.8937393"' android/app/build.gradle
          sed -i 's#distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-8.6-all.zip#' android/gradle/wrapper/gradle-wrapper.properties
      - name: تغيير اسم التطبيق الظاهر تحت الأيقونة إلى SAC
        run: |
          sed -i 's/android:label="[^"]*"/android:label="SAC"/' android/app/src/main/AndroidManifest.xml
          echo "===== AndroidManifest.xml (سطر label) ====="
          grep "android:label" android/app/src/main/AndroidManifest.xml
      - name: إضافة رخصة الإنترنت والموقع والكاميرا
        run: |
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-feature android:name="android.hardware.camera" android:required="false"/>\n    <uses-feature android:name="android.hardware.camera.front" android:required="false"/>' android/app/src/main/AndroidManifest.xml
          echo "===== AndroidManifest.xml (كامل) ====="
          cat android/app/src/main/AndroidManifest.xml
      - name: تثبيت الحزم
        run: flutter pub get
      - name: تصحيح ملفات gradle لكل المكتبات (باج معروف مع flutter.compileSdkVersion)
        run: |
          FOUND_FILES=$(find / -path "*/android/build.gradle" -path "*pub-cache*" 2>/dev/null)
          for f in $FOUND_FILES; do
            if grep -q "flutter\.compileSdkVersion\|flutter\.ndkVersion\|flutter\.minSdkVersion\|flutter\.targetSdkVersion" "$f" 2>/dev/null; then
              echo "تصحيح: $f"
              sed -i 's/flutter\.compileSdkVersion/35/g' "$f"
              sed -i 's/flutter\.ndkVersion/"25.1.8937393"/g' "$f"
              sed -i 's/flutter\.minSdkVersion/21/g' "$f"
              sed -i 's/flutter\.targetSdkVersion/35/g' "$f"
            fi
          done
          echo "انتهى فحص وتصحيح كل ملفات gradle"
      - name: توليد أيقونة التطبيق من assets/icon/app_icon.png
        run: dart run flutter_launcher_icons
      - name: بناء APK
        run: |
          BUILD_STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          echo "وقت هذا البناء: $BUILD_STAMP"
          flutter build apk --release --dart-define=BUILD_STAMP="$BUILD_STAMP"
      - name: رفع الـ APK كملف جاهز للتنزيل
        uses: actions/upload-artifact@v4
        with:
          name: sawaed-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
